<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <title>クライアント - Opus CRM</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__logo">
        <div class="sidebar__logo-icon">O</div>
        <div>
          <div class="sidebar__logo-text">Opus CRM</div>
          <span class="sidebar__logo-sub">営業管理</span>
        </div>
      </div>
      <nav class="sidebar__nav">
        <span class="sidebar__section-label">メニュー</span>
        <a href="index.html" class="nav-item">
          <span class="nav-item__icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
          ダッシュボード
        </a>
        <a href="leads.html" class="nav-item">
          <span class="nav-item__icon"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
          リード管理
        </a>
        <a href="clients.html" class="nav-item is-active">
          <span class="nav-item__icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
          クライアント
        </a>
        <a href="tasks.html" class="nav-item">
          <span class="nav-item__icon"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>
          タスク
        </a>
        <span class="sidebar__section-label">その他</span>
        <a href="settings.html" class="nav-item">
          <span class="nav-item__icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
          設定
        </a>
      </nav>
      <div class="sidebar__footer">
        <div class="sidebar__user">
          <div class="sidebar__avatar">上</div>
          <div>
            <div class="sidebar__user-name">上田 琉</div>
            <div class="sidebar__user-role">管理者</div>
          </div>
        </div>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main -->
    <main class="main">
      <header class="page-header">
        <div class="page-header__left">
          <button class="mobile-menu-btn" id="mobileMenuBtn">
            <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="page-header__title">クライアント</h1>
        </div>
        <div class="page-header__right">
          <button class="btn btn--primary btn--sm">
            <span class="btn__icon"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
            新規登録
          </button>
        </div>
      </header>

      <div class="page-content">

        <!-- Filters -->
        <div class="filters">
          <select class="filter-select" id="filterStatus">
            <option value="">すべてのステータス</option>
            <option value="active">契約中</option>
            <option value="paused">休止中</option>
            <option value="cancelled">解約済</option>
          </select>
          <select class="filter-select" id="filterBusiness">
            <option value="">すべてのサービス</option>
            <option value="sns">SNS運用</option>
            <option value="web">Web制作</option>
          </select>
          <select class="filter-select" id="filterPlan">
            <option value="">すべてのプラン</option>
          </select>
          <div class="filters__spacer"></div>
          <input type="text" class="filter-search" id="filterSearch" placeholder="クライアントを検索...">
        </div>

        <!-- Client Table -->
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>店舗名</th>
                <th>サービス</th>
                <th>プラン</th>
                <th>月額</th>
                <th>契約開始</th>
                <th>ステータス</th>
                <th>NEXT</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="clientsTableBody">
            </tbody>
          </table>
          <div class="table-footer">
            <span>全 <span class="table-footer__stat" id="footerCount">0件</span> のクライアント</span>
            <span>月額合計: <span class="table-footer__stat table-footer__stat--primary" id="footerTotal">¥0</span></span>
          </div>
        </div>

      </div>
    </main>

  </div>

  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/store.js"></script>
  <script src="js/clients.js"></script>
</body>
</html>
