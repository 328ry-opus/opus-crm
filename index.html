<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="apple-touch-icon" href="assets/icon-192.svg">
  <title>ダッシュボード - Opus CRM</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__logo">
        <div class="sidebar__logo-icon">O</div>
        <div>
          <div class="sidebar__logo-text">Opus CRM</div>
          <span class="sidebar__logo-sub">営業管理</span>
        </div>
      </div>

      <nav class="sidebar__nav">
        <span class="sidebar__section-label">メニュー</span>

        <a href="index.html" class="nav-item is-active">
          <span class="nav-item__icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          </span>
          ダッシュボード
        </a>

        <a href="leads.html" class="nav-item">
          <span class="nav-item__icon">
            <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </span>
          リード管理
        </a>

        <a href="clients.html" class="nav-item">
          <span class="nav-item__icon">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </span>
          クライアント
        </a>

        <a href="tasks.html" class="nav-item">
          <span class="nav-item__icon">
            <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          </span>
          タスク
        </a>

        <span class="sidebar__section-label">その他</span>

        <a href="settings.html" class="nav-item">
          <span class="nav-item__icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </span>
          設定
        </a>
      </nav>

      <div class="sidebar__footer">
        <div class="sidebar__user">
          <div class="sidebar__avatar">上</div>
          <div>
            <div class="sidebar__user-name">上田 琉</div>
            <div class="sidebar__user-role">管理者</div>
          </div>
        </div>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main -->
    <main class="main">
      <header class="page-header">
        <div class="page-header__left">
          <button class="mobile-menu-btn" id="mobileMenuBtn">
            <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="page-header__title">ダッシュボード</h1>
        </div>
        <div class="page-header__right">
          <button class="btn btn--primary btn--sm">
            <span class="btn__icon"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
            新規リード
          </button>
        </div>
      </header>

      <div class="page-content">
        <!-- Metrics (rendered by JS) -->
        <section class="section">
          <div class="metric-grid"></div>
        </section>

        <!-- Main Grid -->
        <div class="dashboard-grid">
          <div class="dashboard-grid__main">

            <!-- Today's Actions (rendered by JS) -->
            <section class="section"></section>

          </div>

          <!-- Sidebar: Recent Activity (rendered by JS) -->
          <div class="dashboard-grid__side">
            <section class="section"></section>
          </div>
        </div>

        <!-- Analytics Section -->
        <section class="section" id="analyticsSection">
          <div class="section__header">
            <h2 class="section__title">分析</h2>
          </div>
          <div class="analytics-grid">
            <div class="analytics-card">
              <div class="analytics-card__title">パイプライン（ステージ別リード数）</div>
              <div class="analytics-card__chart">
                <canvas id="chartPipeline"></canvas>
              </div>
            </div>
            <div class="analytics-card">
              <div class="analytics-card__title">月額内訳（プラン別）</div>
              <div class="analytics-card__chart analytics-card__chart--sm">
                <canvas id="chartRevenue"></canvas>
              </div>
            </div>
            <div class="analytics-card analytics-card--full">
              <div class="analytics-card__title">担当者別KPI</div>
              <div id="kpiTable"></div>
            </div>
          </div>
        </section>

      </div>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/shortcuts.js"></script>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
